services:
  cache:
    image: memcached
    ports:
      - "11211:11211"
    entrypoint:
      - memcached
      - -m 64
  db:
    image: postgres:alpine
    labels:
      kompose.volume.type: persistentVolumeClaim
    volumes:
      - postgres_data:/var/lib/postgresql/
    env_file:
      - .env
    ports:
      - "5432"
  keydb:
    image: eqalpha/keydb:latest
    container_name: keydb_cache
    command: keydb-server --server-threads 2 --save ""
    ports:
      - "6379:6379"
    restart: unless-stopped
  web:
    labels:
      kompose.image-pull-policy: "IfNotPresent"
      kompose.volume.type: persistentVolumeClaim
    restart: always
    build:
      context: .
      dockerfile: ./Dockerfile
    image: dockerbird_web:latest
    command: gunicorn web.asgi:application --workers 4 --worker-class uvicorn_worker.UvicornWorker --bind unix:/sockets/gunicorn.sock
    volumes:
      - ./web:/home/web
      - static_volume:/home/web/static
      - media_volume:/home/web/media
      - socket_volume:/sockets
    env_file:
      - .env
    depends_on:
      - cache
      - keydb
      - db
    ports:
      - "8000"
  celery:
    labels:
      kompose.image-pull-policy: "IfNotPresent"
      kompose.volume.type: persistentVolumeClaim
    image: dockerbird_web:latest
    command: celery -A web worker -l info
    volumes:
      - ./web:/home/web
      - static_volume:/home/web/static
      - media_volume:/home/web/media
    env_file:
      - .env
    depends_on:
      - keydb
      - db
      - web
  celery-beat:
    labels:
      kompose.image-pull-policy: "IfNotPresent"
      kompose.volume.type: persistentVolumeClaim
    image: dockerbird_web:latest
    command: celery -A web beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./web:/home/web
      - static_volume:/home/web/static
      - media_volume:/home/web/media
    env_file:
      - .env
    depends_on:
      - keydb
      - db
      - web
  nginx:
    labels:
      kompose.volume.type: persistentVolumeClaim
    image: nginx:alpine
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - static_volume:/home/web/static
      - media_volume:/home/web/media
      - socket_volume:/sockets
    ports:
      - 8000:80
    depends_on:
      - web
volumes:
  postgres_data: {}
  static_volume: {}
  media_volume: {}
  socket_volume: {}